services:
  postgres_test:
    image: postgres:15-alpine
    container_name: test_postgres
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5434:5432"
    restart: unless-stopped

  redis_test:
    image: redis:7-alpine
    container_name: test_redis
    ports:
      - "6380:6379"
    restart: unless-stopped